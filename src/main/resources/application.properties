# H2 Database - Persistent Storage
spring.datasource.url=jdbc:h2:file:./data/shopeease_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console - ENABLED for debugging (but Render may still block)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Force DataLoader to run on every startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.main.allow-circular-references=true

# Server
server.port=8080
server.error.include-message=always

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0
