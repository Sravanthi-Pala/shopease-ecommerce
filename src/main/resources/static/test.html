<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
</head>
<body>
    <h1>✅ Server is Working!</h1>
    <p>If you can see this, your Spring Boot is serving files correctly.</p>
    
    <h2>Products from API:</h2>
    <pre id="products"></pre>
    
    <script>
        fetch('/api/products')
            .then(res => res.json())
            .then(data => {
                document.getElementById('products').textContent = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('products').textContent = 'Error: ' + err.message;
            });
    </script>
</body>
</html>
