<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
        
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100%; background: #1a1a2e; color: white; padding: 20px; z-index: 100; }
        .sidebar h2 { margin-bottom: 30px; font-size: 22px; }
        .sidebar h2 i { margin-right: 10px; }
        .sidebar nav a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: #ccc; text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .sidebar nav a:hover, .sidebar nav a.active { background: #2874f0; color: white; }
        
        .main-content { margin-left: 260px; padding: 20px; }
        .header { background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-number { font-size: 32px; font-weight: bold; color: #2874f0; }
        
        .content-panel { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: none; }
        .content-panel.active { display: block; }
        
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #2874f0; color: white; }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-sm { padding: 4px 8px; font-size: 12px; margin: 2px; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-Pending { background: #ff9800; color: white; }
        .status-Shipped { background: #2196f3; color: white; }
        .status-Delivered { background: #4caf50; color: white; }
        .status-Cancelled { background: #f44336; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 12px; padding: 25px; max-width: 500px; width: 90%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        
        .logout-btn { background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        @media (max-width: 768px) { .sidebar { width: 70px; } .sidebar span:not(.icon) { display: none; } .main-content { margin-left: 70px; } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #4caf50; color: white; padding: 12px 24px; border-radius: 8px; z-index: 9999; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            .btn-warning { background: #ff9800; color: white; }
        .btn-warning:hover { background: #e68900; }
</style>
</head>
<body>
    <div class="sidebar">
        <h2><i class="fas fa-store"></i> <span>ShopEase Admin</span></h2>
        <nav>
            <a href="#" onclick="showPanel('dashboard')" class="active"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="#" onclick="showPanel('products')"><i class="fas fa-box"></i> <span>Products</span></a>
            <a href="#" onclick="showPanel('orders')"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a>
            <a href="#" onclick="showPanel('users')"><i class="fas fa-users"></i> <span>Users</span></a>
            <a href="#" onclick="showPanel('coupons')"><i class="fas fa-tag"></i> <span>Coupons</span></a>
        </nav>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h2><i class="fas fa-chalkboard-user"></i> Admin Control Panel</h2>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        
        <div id="dashboardPanel" class="content-panel active">
            <div class="stats" id="stats"></div>
            <h3>Recent Orders</h3>
            <div id="recentOrders"></div>
        </div>
        
        <div id="productsPanel" class="content-panel">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Products Management</h3>
                <button class="btn btn-primary" onclick="showAddProductModal()"><i class="fas fa-plus"></i> Add Product</button>
            </div>
            <div id="productsTable"></div>
        </div>
        
        <div id="ordersPanel" class="content-panel">
            <h3>All Orders</h3>
            <div id="ordersTable"></div>
        </div>
        
        <div id="usersPanel" class="content-panel">
            <h3>Users Management</h3>
            <div id="usersTable"></div>
        </div>
        
        <div id="couponsPanel" class="content-panel">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3>Coupons Management</h3>
                <button class="btn btn-primary" onclick="showAddCouponModal()"><i class="fas fa-plus"></i> Add Coupon</button>
            </div>
            <div id="couponsTable"></div>
        </div>
    </div>
    
    <!-- Edit Product Modal -->
    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <h3>Edit Product</h3>
            <input type="hidden" id="editProductId">
            <div class="form-group"><label>Name</label><input type="text" id="editName"></div>
            <div class="form-group"><label>Price</label><input type="number" id="editPrice"></div>
            <div class="form-group"><label>Original Price</label><input type="number" id="editOriginalPrice"></div>
            <div class="form-group"><label>Category</label><input type="text" id="editCategory"></div>
            <div class="form-group"><label>Brand</label><input type="text" id="editBrand"></div>
            <div class="form-group"><label>Stock</label><input type="number" id="editStock"></div>
            <div class="form-group"><label>Image URL</label><input type="text" id="editImageUrl"></div>
            <div class="form-group"><label>Description</label><textarea id="editDescription" rows="3"></textarea></div>
            <button class="btn btn-primary" onclick="updateProduct()">Save</button>
            <button class="btn btn-danger" onclick="closeModal('editProductModal')">Cancel</button>
        </div>
    </div>
    
    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <h3>Add Product</h3>
            <div class="form-group"><label>Name</label><input type="text" id="addName"></div>
            <div class="form-group"><label>Price</label><input type="number" id="addPrice"></div>
            <div class="form-group"><label>Original Price</label><input type="number" id="addOriginalPrice"></div>
            <div class="form-group"><label>Category</label><input type="text" id="addCategory"></div>
            <div class="form-group"><label>Brand</label><input type="text" id="addBrand"></div>
            <div class="form-group"><label>Stock</label><input type="number" id="addStock"></div>
            <div class="form-group"><label>Image URL</label><input type="text" id="addImageUrl"></div>
            <div class="form-group"><label>Description</label><textarea id="addDescription" rows="3"></textarea></div>
            <button class="btn btn-primary" onclick="addProduct()">Add</button>
            <button class="btn btn-danger" onclick="closeModal('addProductModal')">Cancel</button>
        </div>
    </div>
    
    <!-- Add Coupon Modal -->
    <div id="addCouponModal" class="modal">
        <div class="modal-content">
            <h3>Add New Coupon</h3>
            <div class="form-group"><label>Coupon Code</label><input type="text" id="couponCode" placeholder="e.g., SAVE20"></div>
            <div class="form-group"><label>Discount Type</label>
                <select id="couponType"><option value="PERCENTAGE">Percentage (%)</option><option value="FIXED">Fixed Amount (₹)</option></select>
            </div>
            <div class="form-group"><label>Discount Value</label><input type="number" id="couponValue" placeholder="10 for 10% or 100 for ₹100"></div>
            <div class="form-group"><label>Minimum Order Amount</label><input type="number" id="couponMinOrder" placeholder="Minimum order amount" value="0"></div>
            <button class="btn btn-primary" onclick="addCoupon()">Add Coupon</button>
            <button class="btn btn-danger" onclick="closeModal('addCouponModal')">Cancel</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('userEmail');
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function checkAdmin() {
            if (currentUser !== 'admin@shopease.com') {
                alert('Admin access required. Please login as admin.');
                window.location.href = '/login.html';
            }
        }
        
        function logout() { localStorage.clear(); window.location.href = '/login.html'; }
        
        function showPanel(panel) {
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panel + 'Panel').classList.add('active');
            document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
            event.target.closest('a').classList.add('active');
            
            if (panel === 'dashboard') loadDashboard();
            if (panel === 'products') loadProducts();
            if (panel === 'orders') loadOrders();
            if (panel === 'users') loadUsers();
            if (panel === 'coupons') loadCoupons();
        }
        
        async function loadDashboard() {
            try {
                const ordersRes = await fetch('/api/orders/all');
                const orders = await ordersRes.json();
                const productsRes = await fetch('/api/products');
                const products = await productsRes.json();
                const usersRes = await fetch('/api/users');
                const users = await usersRes.json();
                
                const totalRevenue = orders.reduce((sum, o) => sum + (o.totalAmount || 0), 0);
                
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${orders.length}</div><div>Total Orders</div></div>
                    <div class="stat-card"><div class="stat-number">${products.length}</div><div>Products</div></div>
                    <div class="stat-card"><div class="stat-number">${users.length}</div><div>Users</div></div>
                    <div class="stat-card"><div class="stat-number">₹${totalRevenue.toLocaleString()}</div><div>Revenue</div></div>
                `;
                
                const recentOrders = orders.slice(0, 5);
                if (recentOrders.length === 0) {
                    document.getElementById('recentOrders').innerHTML = '<p style="text-align:center; padding:20px;">No orders yet</p>';
                } else {
                    document.getElementById('recentOrders').innerHTML = `
                        <table>
                            <tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr>
                            ${recentOrders.map(o => `</tr><td>${o.orderId}</td><td>${o.userName || o.userEmail}</td><td>₹${o.totalAmount}</td><td><span class="status-badge status-${o.status}">${o.status}</span></td><td>${new Date(o.orderDate).toLocaleDateString()}</td></tr>`).join('')}
                        </table>
                    `;
                }
            } catch(e) { console.error(e); document.getElementById('recentOrders').innerHTML = '<p>Error loading orders</p>'; }
        }
        
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                document.getElementById('productsTable').innerHTML = `
                    <table style="width:100%">
                        <tr><th>ID</th><th>Name</th><th>Price</th><th>Category</th><th>Stock</th><th>Actions</th></tr>
                        ${products.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td>₹${p.price}</td><td>${p.category}</td><td>${p.stock || 0}</td><td><button class="btn btn-sm btn-primary" onclick="editProduct(${p.id})">Edit</button> <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button></td></tr>`).join('')}
                    </table>
                `;
            } catch(e) { console.error(e); }
        }
        
        async function loadOrders() {
            try {
                console.log('Fetching orders...');
                const res = await fetch('/api/orders/all');
                const orders = await res.json();
                console.log('Orders received:', orders.length);
                
                if (orders.length === 0) {
                    document.getElementById('ordersTable').innerHTML = '<p style="text-align:center; padding:20px;">No orders found</p>';
                } else {
                    document.getElementById('ordersTable').innerHTML = `
                        <table style="width:100%">
                            <tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Amount</th><th>Status</th><th>Action</th></tr>
                            ${orders.map(o => `<tr>
                                <td>${o.orderId}</td>
                                <td>${o.userName || o.userEmail}</td>
                                <td>${new Date(o.orderDate).toLocaleDateString()}</td>
                                <td>₹${o.totalAmount}</td>
                                <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                                <td><button class="btn btn-sm btn-primary" onclick="updateOrderStatus('${o.orderId}', 'Shipped')">Ship</button>
                                <button class="btn btn-sm btn-danger" onclick="updateOrderStatus('${o.orderId}', 'Cancelled')">Cancel</button></td>
                             </tr>`).join('')}
                        </table>
                    `;
                }
            } catch(e) { 
                console.error('Error loading orders:', e); 
                document.getElementById('ordersTable').innerHTML = '<p style="text-align:center; padding:20px;">Error loading orders. Check console.</p>';
            }
        }
        
        async function updateOrderStatus(orderId, status) {
            try {
                await fetch(`/api/orders/status/${orderId}?status=${status}`, { method: 'PUT' });
                showToast(`Order ${orderId} updated to ${status}`);
                loadOrders();
                loadDashboard();
            } catch(e) { showToast('Error updating order'); }
        }
        
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                document.getElementById('usersTable').innerHTML = `
                    <table style="width:100%">
                        <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Action</th></tr>
                        ${users.map(u => `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.phone || '-'}</td><td><button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Delete</button></td></tr>`).join('')}
                    </table>
                `;
            } catch(e) { console.error(e); }
        }
        
        async function loadCoupons() {
            try {
                const res = await fetch('/api/coupons/list');
                const coupons = await res.json();
                if (coupons.length === 0) {
                    document.getElementById('couponsTable').innerHTML = '<p style="text-align:center; padding:20px;">No coupons yet. Click "Add Coupon" to create one.</p>';
                } else {
                    document.getElementById('couponsTable').innerHTML = `
                        <table style="width:100%">
                            <tr><th>Code</th><th>Type</th><th>Value</th><th>Min Order</th><th>Action</th></tr>
                            ${coupons.map(c => `<tr><td><strong>${c.code}</strong></td><td>${c.discountType}</td><td>${c.discountValue}${c.discountType === 'PERCENTAGE' ? '%' : '₹'}</td><td>₹${c.minOrderAmount || 0}</td><td><button class="btn btn-sm btn-danger" onclick="deleteCoupon('${c.code}')">Delete</button></td></tr>`).join('')}
                        </table>
                    `;
                }
            } catch(e) { console.error(e); document.getElementById('couponsTable').innerHTML = '<p>Error loading coupons</p>'; }
        }
        
        async function editProduct(id) {
            const res = await fetch(`/api/products/${id}`);
            const p = await res.json();
            document.getElementById('editProductId').value = p.id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editOriginalPrice').value = p.originalPrice || '';
            document.getElementById('editCategory').value = p.category;
            document.getElementById('editBrand').value = p.brand || '';
            document.getElementById('editStock').value = p.stock || 0;
            document.getElementById('editImageUrl').value = p.imageUrl || '';
            document.getElementById('editDescription').value = p.description || '';
            document.getElementById('editProductModal').style.display = 'flex';
        }
        
        async function updateProduct() {
            const id = document.getElementById('editProductId').value;
            await fetch(`/api/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('editName').value,
                    price: parseFloat(document.getElementById('editPrice').value),
                    originalPrice: parseFloat(document.getElementById('editOriginalPrice').value) || null,
                    category: document.getElementById('editCategory').value,
                    brand: document.getElementById('editBrand').value,
                    stock: parseInt(document.getElementById('editStock').value),
                    imageUrl: document.getElementById('editImageUrl').value,
                    description: document.getElementById('editDescription').value
                })
            });
            closeModal('editProductModal');
            loadProducts();
            loadDashboard();
            showToast('Product updated successfully!');
        }
        
        async function deleteProduct(id) {
            if (confirm('Delete this product?')) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadProducts();
                loadDashboard();
                showToast('Product deleted!');
            }
        }
        
        function showAddProductModal() { document.getElementById('addProductModal').style.display = 'flex'; }
        
        async function addProduct() {
            await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('addName').value,
                    price: parseFloat(document.getElementById('addPrice').value),
                    originalPrice: parseFloat(document.getElementById('addOriginalPrice').value) || null,
                    category: document.getElementById('addCategory').value,
                    brand: document.getElementById('addBrand').value,
                    stock: parseInt(document.getElementById('addStock').value),
                    imageUrl: document.getElementById('addImageUrl').value,
                    description: document.getElementById('addDescription').value
                })
            });
            closeModal('addProductModal');
            loadProducts();
            loadDashboard();
            showToast('Product added!');
        }
        
        async function deleteUser(id) {
            if (confirm('Delete this user?')) {
                await fetch(`/api/users/${id}`, { method: 'DELETE' });
                loadUsers();
                loadDashboard();
                showToast('User deleted!');
            }
        }
        
        function showAddCouponModal() { document.getElementById('addCouponModal').style.display = 'flex'; }
        
        async function addCoupon() {
            const couponData = {
                code: document.getElementById('couponCode').value.toUpperCase(),
                discountType: document.getElementById('couponType').value,
                discountValue: parseFloat(document.getElementById('couponValue').value),
                minOrderAmount: parseFloat(document.getElementById('couponMinOrder').value) || 0
            };
            
            try {
                const response = await fetch('/api/coupons/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(couponData)
                });
                const result = await response.json();
                if (result.success) {
                    closeModal('addCouponModal');
                    loadCoupons();
                    showToast('Coupon added successfully!');
                    document.getElementById('couponCode').value = '';
                    document.getElementById('couponValue').value = '';
                    document.getElementById('couponMinOrder').value = '0';
                } else {
                    showToast('Error: ' + result.message);
                }
            } catch(e) {
                let coupons = JSON.parse(localStorage.getItem('admin_coupons') || '[]');
                coupons.push(couponData);
                localStorage.setItem('admin_coupons', JSON.stringify(coupons));
                closeModal('addCouponModal');
                loadCoupons();
                showToast('Coupon added (local storage)!');
            }
        }
        
        async function deleteCoupon(code) {
            if (confirm('Delete this coupon?')) {
                try {
                    await fetch(`/api/coupons/${code}`, { method: 'DELETE' });
                    loadCoupons();
                    showToast('Coupon deleted!');
                } catch(e) {
                    let coupons = JSON.parse(localStorage.getItem('admin_coupons') || '[]');
                    coupons = coupons.filter(c => c.code !== code);
                    localStorage.setItem('admin_coupons', JSON.stringify(coupons));
                    loadCoupons();
                    showToast('Coupon deleted!');
                }
            }
        }
        
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        window.onclick = function(e) { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; }
        
        checkAdmin();
        loadDashboard();
    </script>
</body>
</html>
