<!DOCTYPE html>
<html>
<head>
    <title>My Orders - ShopEase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: #2874f0; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 24px; font-weight: bold; cursor: pointer; color: white; text-decoration: none; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .order-card { background: white; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .order-header { background: #f8f9fa; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 10px; }
        .order-id { font-weight: bold; color: #2874f0; }
        .order-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #ff9800; color: white; }
        .status-shipped { background: #2196f3; color: white; }
        .status-delivered { background: #4caf50; color: white; }
        .status-cancelled { background: #f44336; color: white; }
        .order-items { padding: 20px; }
        .order-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .order-total { text-align: right; padding: 15px 20px; background: #f8f9fa; font-weight: bold; }
        .order-actions { padding: 15px 20px; background: #f8f9fa; border-top: 1px solid #eee; text-align: right; }
        .cancel-btn { background: #f44336; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .cancel-btn:hover { background: #d32f2f; }
        .empty-orders { text-align: center; padding: 60px; background: white; border-radius: 12px; }
        .footer { background: #2c3e50; color: white; text-align: center; padding: 20px; margin-top: 40px; }
        .back-home { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #2874f0; color: white; text-decoration: none; border-radius: 5px; }
        .loading { text-align: center; padding: 50px; color: #666; }
        a { color: white; text-decoration: none; }
        @media (max-width: 768px) { .order-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">🛍️ ShopEase</div>
        <div><a href="/" style="color: white;">← Back to Shop</a></div>
    </div>
    
    <div class="container">
        <h1 style="margin-bottom: 20px;">My Orders</h1>
        <div id="ordersList" class="loading">Loading your orders...</div>
    </div>
    
    <div class="footer">
        <p>&copy; 2024 ShopEase. All rights reserved.</p>
    </div>

    <script>
        const userEmail = localStorage.getItem('userEmail');
        
        async function loadOrders() {
            if (!userEmail) {
                window.location.href = '/login.html';
                return;
            }
            
            try {
                console.log('Fetching orders for:', userEmail);
                const response = await fetch(`/api/orders/user/${encodeURIComponent(userEmail)}`);
                const orders = await response.json();
                console.log('Orders found:', orders.length);
                
                const container = document.getElementById('ordersList');
                
                if (!orders || orders.length === 0) {
                    container.innerHTML = '<div class="empty-orders"><div style="font-size: 48px;">📦</div><h3>No orders yet</h3><p>Start shopping to see your orders here!</p><a href="/" class="back-home">Continue Shopping</a></div>';
                    return;
                }
                
                container.innerHTML = orders.map(order => {
                    let items = [];
                    try {
                        if (typeof order.items === 'string') {
                            items = JSON.parse(order.items);
                        } else if (Array.isArray(order.items)) {
                            items = order.items;
                        }
                    } catch(e) {
                        console.log('Error parsing items:', e);
                        items = [];
                    }
                    
                    const orderDate = order.orderDate ? new Date(order.orderDate).toLocaleDateString() : 'New Order';
                    const status = order.status || 'Pending';
                    const totalAmount = order.totalAmount || 0;
                    const canCancel = status === 'Pending';
                    
                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <div class="order-id">Order #${order.orderId || 'N/A'}</div>
                                <div>Date: ${orderDate}</div>
                                <div class="order-status status-${status.toLowerCase()}">${status}</div>
                            </div>
                            <div class="order-items">
                                ${items.map(item => `
                                    <div class="order-item">
                                        <span>${item.name} x ${item.quantity || 1}</span>
                                        <span>₹${((item.price || 0) * (item.quantity || 1)).toLocaleString()}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="order-total">Total: ₹${(totalAmount || 0).toLocaleString()}</div>
                            <div class="order-actions">
                                ${canCancel ? `<button class="cancel-btn" onclick="cancelOrder('${order.orderId}')">Cancel Order</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersList').innerHTML = '<div class="empty-orders"><h3>Error loading orders</h3><a href="/" class="back-home">Continue Shopping</a></div>';
            }
        }
        
        async function cancelOrder(orderId) {
            if (confirm('Are you sure you want to cancel this order? This action cannot be undone.')) {
                try {
                    const response = await fetch(`/api/orders/cancel/${orderId}?email=${encodeURIComponent(userEmail)}`, {
                        method: 'POST'
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        alert(result.message);
                        loadOrders(); // Refresh the orders list
                    } else {
                        alert('Failed to cancel order: ' + result.message);
                    }
                } catch (error) {
                    alert('Error cancelling order: ' + error.message);
                }
            }
        }
        
        loadOrders();
    </script>
</body>
</html>
