<!DOCTYPE html>
<html>
<head>
    <title>Login - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; font-size: 32px; font-weight: bold; color: #2874f0; margin-bottom: 30px; }
        h2 { text-align: center; margin-bottom: 25px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        input:focus { outline: none; border-color: #2874f0; }
        .btn { width: 100%; padding: 12px; background: #2874f0; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; font-weight: 600; }
        .btn:hover { background: #1a5bc7; }
        
        /* Social Login Section */
        .social-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .social-title { text-align: center; margin-bottom: 15px; color: #666; font-size: 14px; position: relative; }
        .social-buttons { display: flex; gap: 15px; justify-content: center; }
        .social-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.3s; color: white; }
        .google-btn { background: #db4437; }
        .google-btn:hover { background: #c53929; transform: translateY(-2px); }
        .facebook-btn { background: #4267B2; }
        .facebook-btn:hover { background: #365899; transform: translateY(-2px); }
        
        .switch-link { text-align: center; margin-top: 20px; color: #666; }
        .switch-link a { color: #2874f0; text-decoration: none; cursor: pointer; }
        .error { background: #ffebee; color: #f44336; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .success { background: #e8f5e9; color: #4caf50; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🛍️ ShopEase</div>
        
        <div id="loginForm">
            <h2>Welcome Back!</h2>
            <div id="loginMessage"></div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <button class="btn" onclick="login()">Login</button>
            
            <!-- Social Login Section -->
            <div class="social-section">
                <div class="social-title">Or login with</div>
                <div class="social-buttons">
                    <button class="social-btn google-btn" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn facebook-btn" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>
            </div>
            
            <div class="switch-link">
                New to ShopEase? <a onclick="showRegister()">Create Account</a>
            </div>
        </div>
        
        <div id="registerForm" style="display: none;">
            <h2>Create Account</h2>
            <div id="registerMessage"></div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="regPhone" placeholder="Enter your phone number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
            </div>
            <button class="btn" onclick="register()">Register</button>
            
            <!-- Social Login Section for Register -->
            <div class="social-section">
                <div class="social-title">Or sign up with</div>
                <div class="social-buttons">
                    <button class="social-btn google-btn" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn facebook-btn" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>
            </div>
            
            <div class="switch-link">
                Already have an account? <a onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>

    <script>
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('loginMessage', 'Please enter email and password', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', result.name);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = '/';
                } else {
                    showMessage('loginMessage', result.message || 'Invalid email or password', 'error');
                }
            } catch (error) {
                showMessage('loginMessage', 'Login failed. Please try again.', 'error');
            }
        }
        
        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!name || !email || !phone || !password) {
                showMessage('registerMessage', 'Please fill all fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('registerMessage', 'Passwords do not match', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, phone })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('registerMessage', result.message, 'success');
                    setTimeout(() => {
                        showLogin();
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                } else {
                    showMessage('registerMessage', result.message, 'error');
                }
            } catch (error) {
                showMessage('registerMessage', 'Registration failed. Please try again.', 'error');
            }
        }
        
        // Social Login - Demo implementation
        function socialLogin(provider) {
            // For demo purposes, create a demo user
            const demoEmail = `${provider}_user@shopease.com`;
            const demoName = provider === 'google' ? 'Google User' : 'Facebook User';
            
            // Store in localStorage
            localStorage.setItem('userEmail', demoEmail);
            localStorage.setItem('userName', demoName);
            localStorage.setItem('isLoggedIn', 'true');
            
            showMessage('loginMessage', `Logged in with ${provider.toUpperCase()}! Redirecting...`, 'success');
            
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        }
        
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => {
                element.innerHTML = '';
            }, 3000);
        }
    </script>
</body>
</html>
