<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #2874f0, #1a5be0); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { color: white; font-size: 24px; font-weight: bold; cursor: pointer; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .wishlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .wishlist-card { background: white; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .wishlist-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .product-image { height: 200px; overflow: hidden; position: relative; background: #f8f9fa; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .product-brand { font-size: 12px; color: #666; margin-bottom: 5px; }
        .product-price { font-size: 18px; font-weight: bold; color: #2874f0; }
        .original-price { text-decoration: line-through; color: #999; font-size: 12px; margin-left: 8px; }
        .rating { display: flex; align-items: center; gap: 5px; margin: 8px 0; font-size: 12px; }
        .stars { color: #ffc107; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 8px; }
        .btn-cart { background: #2874f0; color: white; }
        .btn-cart:hover { background: #1a5bc7; }
        .btn-remove { background: #ff6b6b; color: white; }
        .btn-remove:hover { background: #ff5252; }
        .btn-share { background: #4caf50; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-share:hover { background: #45a049; }
        .empty-wishlist { text-align: center; padding: 60px; background: white; border-radius: 12px; }
        .footer { background: #172337; color: white; text-align: center; padding: 20px; margin-top: 40px; }
        @media (max-width: 768px) { .wishlist-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">🛍️ ShopEase</div>
        <a href="/" style="color: white;">← Back to Shop</a>
    </div>
    
    <div class="container">
        <h1 style="margin-bottom: 20px;"><i class="fas fa-heart" style="color: #ff6b6b;"></i> My Wishlist</h1>
        <div id="wishlistGrid" class="wishlist-grid"><div class="loading">Loading...</div></div>
    </div>
    
    <div class="footer"><p>&copy; 2024 ShopEase. All rights reserved.</p></div>

    <script>
        let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
        
        function getStarRating(rating) {
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5;
            const empty = 5 - full - (half ? 1 : 0);
            return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
        }
        
        function shareProduct(product) {
            const shareText = `🛍️ Check out this product on ShopEase!\n\n📦 ${product.name}\n💰 ₹${product.price.toLocaleString()}\n🏷️ Brand: ${product.brand || 'ShopEase'}\n⭐ Rating: ${product.rating || 4}★\n\nShop now: http://localhost:8080/product.html?id=${product.id}`;
            navigator.clipboard.writeText(shareText);
            alert('✅ Product link copied to clipboard! Share it with your friends!');
        }
        
        function removeFromWishlist(id) {
            wishlist = wishlist.filter(item => item.id !== id);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            loadWishlist();
            updateWishlistCount();
        }
        
        function addToCart(product) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.quantity = (existing.quantity || 1) + 1;
            } else {
                cart.push({...product, quantity: 1});
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(`${product.name} added to cart! 🎉`);
            updateCartCount();
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const cartCountElem = document.getElementById('cartCount');
            if (cartCountElem) cartCountElem.textContent = total;
        }
        
        function updateWishlistCount() {
            const wishlistCount = document.getElementById('wishlistCount');
            if (wishlistCount) wishlistCount.textContent = wishlist.length;
        }
        
        function loadWishlist() {
            const container = document.getElementById('wishlistGrid');
            if (wishlist.length === 0) {
                container.innerHTML = '<div class="empty-wishlist"><i class="fas fa-heart" style="font-size: 64px; color: #ccc; margin-bottom: 20px;"></i><h3>Your wishlist is empty</h3><p>Add items to your wishlist by clicking the ❤️ icon on products</p><button onclick="window.location.href=\'/\'" style="margin-top: 20px; padding: 10px 20px; background: #2874f0; color: white; border: none; border-radius: 8px; cursor: pointer;">Continue Shopping</button></div>';
                return;
            }
            
            container.innerHTML = wishlist.map(product => {
                const discountPercent = product.originalPrice ? Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100) : 0;
                const productImage = product.imageUrl || 'https://placehold.co/300x300/2874f0/white?text=Product';
                const rating = product.rating || 4;
                
                return `
                    <div class="wishlist-card">
                        <div class="product-image">
                            <img src="${productImage}" alt="${product.name}" onerror="this.src='https://placehold.co/300x300/2874f0/white?text=${product.name}'">
                            ${discountPercent > 0 ? `<div class="discount-badge" style="position: absolute; top: 10px; left: 10px; background: #ff6b6b; color: white; padding: 4px 8px; border-radius: 20px; font-size: 11px;">${discountPercent}% OFF</div>` : ''}
                        </div>
                        <div class="product-info">
                            <div class="product-title">${product.name}</div>
                            <div class="product-brand">${product.brand || 'ShopEase'}</div>
                            <div class="product-price">
                                ₹${product.price.toLocaleString()}
                                ${product.originalPrice ? `<span class="original-price">₹${product.originalPrice.toLocaleString()}</span>` : ''}
                            </div>
                            <div class="rating">
                                <div class="stars">${getStarRating(rating)}</div>
                                <span>(${product.ratingCount || 100} reviews)</span>
                            </div>
                            <button class="btn btn-cart" onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                                <i class="fas fa-shopping-cart"></i> Add to Cart
                            </button>
                            <button class="btn btn-share" onclick="shareProduct(${JSON.stringify(product).replace(/"/g, '&quot;')})">
                                <i class="fas fa-share-alt"></i> Share Product
                            </button>
                            <button class="btn btn-remove" onclick="removeFromWishlist(${product.id})">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        loadWishlist();
    </script>
</body>
</html>
