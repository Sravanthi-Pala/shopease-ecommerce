<!DOCTYPE html>
<html>
<head>
    <title>Settings - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #2874f0, #1a5be0); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: white; font-size: 24px; font-weight: bold; cursor: pointer; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .settings-card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .setting-item:last-child { border-bottom: none; }
        .setting-label { font-weight: 500; }
        .toggle-switch { width: 50px; height: 24px; background: #ccc; border-radius: 12px; cursor: pointer; position: relative; transition: 0.3s; }
        .toggle-switch.active { background: #2874f0; }
        .toggle-switch:after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 3px; transition: 0.3s; }
        .toggle-switch.active:after { left: 27px; }
        select, input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; width: 150px; }
        .btn-save { background: #2874f0; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin-top: 20px; width: 100%; }
        .footer { background: #172337; color: white; text-align: center; padding: 20px; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">🛍️ ShopEase</div>
        <a href="/" style="color: white;">← Back to Shop</a>
    </div>
    <div class="container">
        <h1 style="margin-bottom: 20px;"><i class="fas fa-cog"></i> Settings</h1>
        <div class="settings-card">
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-bell"></i> Push Notifications</span>
                <div class="toggle-switch" id="notificationToggle" onclick="toggleNotification()"></div>
            </div>
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-envelope"></i> Email Notifications</span>
                <div class="toggle-switch" id="emailToggle" onclick="toggleEmail()"></div>
            </div>
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-palette"></i> Theme</span>
                <select id="themeSelect">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="setting-label"><i class="fas fa-language"></i> Language</span>
                <select id="languageSelect">
                    <option value="en">English</option>
                    <option value="hi">Hindi</option>
                </select>
            </div>
            <button class="btn-save" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>
    <div class="footer"><p>&copy; 2024 ShopEase. All rights reserved.</p></div>
    <script>
        function loadSettings() {
            const notifications = localStorage.getItem('pushNotifications') === 'true';
            const emails = localStorage.getItem('emailNotifications') === 'true';
            const theme = localStorage.getItem('theme') || 'light';
            const language = localStorage.getItem('language') || 'en';
            document.getElementById('notificationToggle').classList.toggle('active', notifications);
            document.getElementById('emailToggle').classList.toggle('active', emails);
            document.getElementById('themeSelect').value = theme;
            document.getElementById('languageSelect').value = language;
            if (theme === 'dark') document.body.style.background = '#1a1a2e';
        }
        function toggleNotification() {
            const toggle = document.getElementById('notificationToggle');
            toggle.classList.toggle('active');
        }
        function toggleEmail() {
            const toggle = document.getElementById('emailToggle');
            toggle.classList.toggle('active');
        }
        function saveSettings() {
            localStorage.setItem('pushNotifications', document.getElementById('notificationToggle').classList.contains('active'));
            localStorage.setItem('emailNotifications', document.getElementById('emailToggle').classList.contains('active'));
            localStorage.setItem('theme', document.getElementById('themeSelect').value);
            localStorage.setItem('language', document.getElementById('languageSelect').value);
            alert('Settings saved successfully!');
            if (document.getElementById('themeSelect').value === 'dark') {
                document.body.style.background = '#1a1a2e';
            } else {
                document.body.style.background = '#f0f2f5';
            }
        }
        loadSettings();
    </script>
</body>
</html>
