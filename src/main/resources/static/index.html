<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #2874f0 0%, #1a5be0 100%); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .logo { color: white; font-size: 28px; font-weight: bold; cursor: pointer; }
        .logo span { color: #ffe500; }
        .search-bar { flex: 1; max-width: 400px; display: flex; background: white; border-radius: 8px; overflow: hidden; }
        .search-bar input { flex: 1; padding: 10px 15px; border: none; outline: none; }
        .search-bar button { padding: 10px 20px; background: #ff6b6b; color: white; border: none; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .badge { background: #ff6b6b; border-radius: 50%; padding: 2px 8px; font-size: 12px; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .filters { background: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group select, .filter-group input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; }
        .product-count { background: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: 600; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; transition: transform 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        .product-image { height: 180px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 60px; }
        .product-info { padding: 15px; }
        .product-name { font-weight: 600; font-size: 16px; margin-bottom: 5px; }
        .product-category { font-size: 12px; color: #999; margin-bottom: 5px; }
        .product-brand { font-size: 12px; color: #2874f0; margin-bottom: 5px; }
        .product-price { color: #2874f0; font-weight: 700; font-size: 18px; }
        .original-price { text-decoration: line-through; color: #999; font-size: 12px; margin-left: 8px; }
        .discount { color: #4caf50; font-size: 11px; margin-left: 8px; }
        .rating { color: #ffc107; font-size: 13px; margin: 5px 0; }
        .add-to-cart { width: 100%; padding: 10px; background: #ff6b6b; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: 600; transition: background 0.3s; }
        .add-to-cart:hover { background: #ff5252; }
        .footer { background: #172337; color: white; text-align: center; padding: 20px; margin-top: 40px; }
        @media (max-width: 768px) { .header { flex-direction: column; } .search-bar { max-width: 100%; width: 100%; } .filters { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">Shop<span>Ease</span></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
        </div>
        <div class="nav-links">
            <a href="#">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="badge" id="cartCount">0</span>

    <div class="container">
        <div class="filters">
            <div class="filter-group">
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="all">All</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Footwear">Footwear</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Home Decor">Home Decor</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Stationery">Stationery</option>
                    <option value="Sports">Sports</option>
                    <option value="Jewellery">Jewellery</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Sort by:</label>
                <select id="sortFilter">
                    <option value="default">Featured</option>
                    <option value="price_low">Price: Low to High</option>
                    <option value="price_high">Price: High to Low</option>
                </select>
            </div>
            <button onclick="applyFilters()" style="padding: 8px 20px; background: #2874f0; color: white; border: none; border-radius: 5px; cursor: pointer;">Apply Filters</button>
        </div>

        <div class="product-count" id="productCount">Loading 41 products...</div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

        <p>&copy; 2024 ShopEase - 41 Amazing Products! 🎉</p>
    </div>

            { id: 35, name: "Men Watch", price: 2999, originalPrice: 9999, discount: "70%", category: "Accessories", brand: "Fastrack", rating: 4.7, image: "⌚" },
            { id: 36, name: "Women Watch", price: 2499, originalPrice: 4999, discount: "50%", category: "Accessories", brand: "Titan", rating: 4.6, image: "⌚" },
            { id: 37, name: "Gold Necklace", price: 2499, originalPrice: 7999, discount: "69%", category: "Jewellery", brand: "PC Jeweller", rating: 4.6, image: "📿" },
            { id: 38, name: "Golden Earrings", price: 899, originalPrice: 2999, discount: "70%", category: "Jewellery", brand: "Caratlane", rating: 4.5, image: "💍" },
            { id: 39, name: "Laptop Backpack", price: 1299, originalPrice: 3999, discount: "67%", category: "Stationery", brand: "Skybags", rating: 4.6, image: "🎒" },
            { id: 40, name: "Parker Pen Set", price: 299, originalPrice: 699, discount: "57%", category: "Stationery", brand: "Parker", rating: 4.7, image: "✒️" },
            { id: 41, name: "Yoga Mat", price: 999, originalPrice: 1999, discount: "50%", category: "Sports", brand: "Decathlon", rating: 4.4, image: "🧘" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentCategory = 'all';
        let currentSort = 'default';
        let searchQuery = '';

        function displayProducts() {
            let filtered = [...ALL_PRODUCTS];
            
            // Apply search
            if (searchQuery) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.category.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.brand.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }
            
            // Apply category filter
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            // Apply sorting
            if (currentSort === 'price_low') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (currentSort === 'price_high') {
                filtered.sort((a, b) => b.price - a.price);
            }
            
            // Update count
            document.getElementById('productCount').innerHTML = `🛍️ Showing ${filtered.length} of ${ALL_PRODUCTS.length} Products`;
            
            // Render products
            const grid = document.getElementById('productsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 50px;">❌ No products found. Try different filters!</div>';
                return;
            }
            
            grid.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.image}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-category">${product.category}</div>
                        <div class="product-brand">${product.brand}</div>
                        <div class="rating">${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5-Math.floor(product.rating))} (${product.rating})</div>
                        <div class="product-price">
                            ₹${product.price.toLocaleString()}
                            <span class="original-price">₹${product.originalPrice.toLocaleString()}</span>
                            <span class="discount">${product.discount} off</span>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">
                            <i class="fas fa-shopping-cart"></i> Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function addToCart(id) {
            const product = ALL_PRODUCTS.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            
            if (existing) {
                existing.quantity = (existing.quantity || 1) + 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert(`✅ ${product.name} added to cart!`);
        }
        
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.getElementById('cartCount').innerText = count;
        }
        
        function searchProducts() {
            searchQuery = document.getElementById('searchInput').value;
            displayProducts();
        }
        
        function applyFilters() {
            currentCategory = document.getElementById('categoryFilter').value;
            currentSort = document.getElementById('sortFilter').value;
            displayProducts();
        }
        
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') searchProducts();
        });
        
        // Initialize
        displayProducts();
        updateCartCount();
        console.log(`✅ ${ALL_PRODUCTS.length} products loaded!`);
    </script>

</html>
