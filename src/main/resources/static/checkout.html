@'
<!DOCTYPE html>
<html>
<head>
    <title>Checkout - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #2874f0 0%, #1a5be0 100%); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { color: white; font-size: 24px; font-weight: bold; cursor: pointer; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .checkout-form, .order-summary { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; color: #333; border-bottom: 2px solid #2874f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Poppins', sans-serif; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; }
        .summary-total { border-top: 2px solid #333; margin-top: 10px; padding-top: 15px; font-weight: bold; font-size: 18px; }
        .btn-place-order { width: 100%; padding: 15px; background: #ff6b6b; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        .btn-place-order:hover { background: #ff5252; }
        .footer { background: #172337; color: white; text-align: center; padding: 20px; margin-top: 40px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">🛍️ ShopEase</div>
        <div><a href="/cart.html" style="color: white; text-decoration: none;">← Back to Cart</a></div>
    </div>
    
    <div class="container">
        <div class="checkout-form">
            <h2>Shipping Details</h2>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">
            </div>
            <div class="form-group">
                <label>Delivery Address *</label>
                <textarea id="address" rows="3" placeholder="Enter your complete address"></textarea>
            </div>
        </div>
        
        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="cartItems"></div>
            <div id="priceDetails"></div>
            <button class="btn-place-order" onclick="placeOrder()">Place Order</button>
        </div>
    </div>
    
    <div class="footer">
        <p>&copy; 2024 ShopEase. All rights reserved.</p>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentUserEmail = localStorage.getItem('userEmail') || '';
        
        function displayCart() {
            if (cart.length === 0) {
                document.getElementById('cartItems').innerHTML = '<p style="text-align: center; color: #999;">Your cart is empty</p>';
                document.getElementById('priceDetails').innerHTML = '';
                return;
            }
            
            let subtotal = 0;
            document.getElementById('cartItems').innerHTML = cart.map(item => {
                const itemTotal = item.price * (item.quantity || 1);
                subtotal += itemTotal;
                return `<div class="cart-item"><span>${item.name} x ${item.quantity || 1}</span><span>₹${itemTotal.toLocaleString()}</span></div>`;
            }).join('');
            
            updatePriceDetails(subtotal);
        }
        
        function updatePriceDetails(subtotal) {
            const delivery = subtotal > 500 ? 0 : 40;
            const total = subtotal + delivery;
            
            document.getElementById('priceDetails').innerHTML = `
                <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                <div class="summary-row"><span>Delivery Charges</span><span>${delivery === 0 ? 'FREE' : '₹' + delivery.toLocaleString()}</span></div>
                <div class="summary-total"><span>Total Amount</span><span>₹${total.toLocaleString()}</span></div>
            `;
        }
        
        async function placeOrder() {
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            if (!name || !email || !phone || !address) {
                alert('❌ Please fill all shipping details');
                return;
            }
            
            if (cart.length === 0) {
                alert('❌ Your cart is empty');
                return;
            }
            
            let subtotal = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            let total = subtotal + (subtotal > 500 ? 0 : 40);
            
            const orderData = {
                userEmail: email,
                userName: name,
                totalAmount: total,
                paymentMethod: 'Cash on Delivery',
                shippingAddress: address,
                phone: phone,
                items: JSON.stringify(cart)
            };
            
            try {
                const response = await fetch('/api/orders/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();
                
                if (result.success) {
                    alert(`✅ Order placed successfully!\n\nOrder ID: ${result.orderId}\nTotal Amount: ₹${total.toLocaleString()}\n\nThank you for shopping with ShopEase!`);
                    localStorage.removeItem('cart');
                    window.location.href = `/orders.html?email=${encodeURIComponent(email)}`;
                } else {
                    alert('❌ Failed to place order: ' + result.message);
                }
            } catch (error) {
                alert('❌ Error placing order: ' + error.message);
            }
        }
        
        if (currentUserEmail) {
            document.getElementById('email').value = currentUserEmail;
        }
        
        displayCart();
    </script>
</body>
</html>
'@ | Out-File -FilePath "checkout.html" -Encoding UTF8 -Force
