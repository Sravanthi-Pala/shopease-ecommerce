<!DOCTYPE html>
<html>
<head>
    <title>Checkout - ShopEase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #2874f0 0%, #1a5be0 100%); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { color: white; font-size: 24px; font-weight: bold; cursor: pointer; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .checkout-form, .order-summary { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; color: #333; border-bottom: 2px solid #2874f0; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: 'Poppins', sans-serif; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; }
        .summary-total { border-top: 2px solid #333; margin-top: 10px; padding-top: 15px; font-weight: bold; font-size: 18px; }
        .btn-place-order { width: 100%; padding: 15px; background: #ff6b6b; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        .btn-place-order:hover { background: #ff5252; }
        .footer { background: #172337; color: white; text-align: center; padding: 20px; margin-top: 40px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .error { border-color: #ff6b6b !important; }
        .error-message { color: #ff6b6b; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="window.location.href='/'">🛍️ ShopEase</div>
        <div><a href="/cart.html" style="color: white; text-decoration: none;">← Back to Cart</a></div>
    </div>
    
    <div class="container">
        <div class="checkout-form">
            <h2>Shipping Details</h2>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
                <div class="error-message" id="nameError"></div>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="Enter your email">
                <div class="error-message" id="emailError"></div>
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">
                <div class="error-message" id="phoneError"></div>
            </div>
            <div class="form-group">
                <label>Delivery Address *</label>
                <textarea id="address" rows="3" placeholder="Enter your complete address"></textarea>
                <div class="error-message" id="addressError"></div>
            </div>
        </div>
        
        <div class="order-summary">
            <h2>Order Summary</h2>
            <div id="cartItems"></div>
            <div id="priceDetails"></div>
            <button class="btn-place-order" onclick="placeOrder()">Place Order</button>
        </div>
    </div>
    
    <div class="footer">
        <p>&copy; 2024 ShopEase. All rights reserved.</p>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let currentUserEmail = localStorage.getItem('userEmail') || '';
        
        function displayCart() {
            const container = document.getElementById('cartItems');
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">Your cart is empty</p>';
                document.getElementById('priceDetails').innerHTML = '';
                return;
            }
            
            let subtotal = 0;
            container.innerHTML = cart.map(item => {
                const itemTotal = item.price * (item.quantity || 1);
                subtotal += itemTotal;
                return `<div class="cart-item"><span>${item.name} x ${item.quantity || 1}</span><span>₹${itemTotal.toLocaleString()}</span></div>`;
            }).join('');
            
            updatePriceDetails(subtotal);
        }
        
        function updatePriceDetails(subtotal) {
            const delivery = subtotal > 500 ? 0 : 40;
            const total = subtotal + delivery;
            
            document.getElementById('priceDetails').innerHTML = `
                <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
                <div class="summary-row"><span>Delivery Charges</span><span>${delivery === 0 ? 'FREE' : '₹' + delivery}</span></div>
                <div class="summary-total"><span>Total Amount</span><span>₹${total.toLocaleString()}</span></div>
            `;
        }
        
        function validateForm() {
            let isValid = true;
            
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            // Name validation
            if (!name) {
                document.getElementById('nameError').innerHTML = 'Full name is required';
                document.getElementById('fullName').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('nameError').innerHTML = '';
                document.getElementById('fullName').classList.remove('error');
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                document.getElementById('emailError').innerHTML = 'Valid email is required';
                document.getElementById('email').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('emailError').innerHTML = '';
                document.getElementById('email').classList.remove('error');
            }
            
            // Phone validation
            const phoneRegex = /^\d{10}$/;
            if (!phone || !phoneRegex.test(phone)) {
                document.getElementById('phoneError').innerHTML = '10-digit phone number is required';
                document.getElementById('phone').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('phoneError').innerHTML = '';
                document.getElementById('phone').classList.remove('error');
            }
            
            // Address validation
            if (!address) {
                document.getElementById('addressError').innerHTML = 'Delivery address is required';
                document.getElementById('address').classList.add('error');
                isValid = false;
            } else {
                document.getElementById('addressError').innerHTML = '';
                document.getElementById('address').classList.remove('error');
            }
            
            return isValid;
        }
        
        async function placeOrder() {
            // Validate form
            if (!validateForm()) {
                alert('❌ Please fill all required fields correctly');
                return;
            }
            
            // Get form values
            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            
            // Check cart
            if (cart.length === 0) {
                alert('❌ Your cart is empty');
                return;
            }
            
            // Calculate totals
            let subtotal = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            let total = subtotal + (subtotal > 500 ? 0 : 40);
            
            // Generate order ID
            const orderId = 'ORD' + Date.now();
            
            // Prepare order data
            const orderData = {
                orderId: orderId,
                userEmail: email,
                userName: name,
                totalAmount: total,
                paymentMethod: 'Cash on Delivery',
                shippingAddress: address,
                phone: phone,
                items: JSON.stringify(cart),
                orderDate: new Date().toISOString(),
                status: 'Pending'
            };
            
            // Save to localStorage (backup)
            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(orderData);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // Try to send to backend
            let orderPlaced = false;
            let backendOrderId = orderId;
            
            try {
                const response = await fetch('/api/orders/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        orderPlaced = true;
                        backendOrderId = result.orderId || orderId;
                    }
                }
            } catch (error) {
                console.log('Backend not available, using local order');
            }
            
            // Clear cart
            localStorage.removeItem('cart');
            cart = [];
            
            // Show success message
            alert(`✅ Order Placed Successfully!\n\nOrder ID: ${backendOrderId}\nTotal Amount: ₹${total.toLocaleString()}\n\nThank you for shopping with ShopEase!\n\nYour order will be delivered within 3-5 business days.`);
            
            // Redirect to orders page
            window.location.href = `/orders.html?email=${encodeURIComponent(email)}`;
        }
        
        // Load email from localStorage
        if (currentUserEmail) {
            document.getElementById('email').value = currentUserEmail;
        }
        
        // Remove error styling on input
        ['fullName', 'email', 'phone', 'address'].forEach(id => {
            const element = document.getElementById(id);
            if (element) {
                element.addEventListener('input', function() {
                    this.classList.remove('error');
                    document.getElementById(`${id}Error`).innerHTML = '';
                });
            }
        });
        
        // Initialize
        displayCart();
    </script>
</body>
</html>
